<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pontec OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0b1220; --panel:#0d1526; --card:#111a2e; --borde:#243049;
    --texto:#e6edf7; --texto2:#8b97ad; --accent:#3b82f6; --verde:#22c55e; --rojo:#f87171;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--texto);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}

  /* ── Login ── */
  #login-view{height:100%;display:flex;align-items:center;justify-content:center;padding:20px}
  #login-card{width:100%;max-width:360px;background:var(--card);border:1px solid var(--borde);border-radius:14px;padding:28px}
  #login-card h1{font-size:22px;font-weight:800;letter-spacing:.04em;margin-bottom:4px}
  #login-card h1 span{color:var(--accent)}
  #login-card p{font-size:12px;color:var(--texto2);margin-bottom:20px}
  #login-card input{width:100%;padding:11px;border-radius:8px;border:1px solid var(--borde);background:#0b1220;color:var(--texto);font-size:14px;margin-bottom:10px}
  #login-card button{width:100%;padding:11px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
  #login-err{font-size:12px;color:var(--rojo);margin-top:10px;min-height:16px}

  /* ── Sistema ── */
  #os-view{display:none;height:100%}
  #os-view.on{display:flex}
  #side{width:58px;min-width:58px;background:var(--panel);border-right:1px solid var(--borde);display:flex;flex-direction:column;padding:14px 10px;transition:width .18s ease,min-width .18s ease;overflow:hidden}
  #side:hover{width:210px;min-width:210px}
  #side .lbl{white-space:nowrap}
  #side:not(:hover) .lbl{display:none}
  #side:not(:hover) .lbl-b{display:none}
  #side:not(:hover) .pronto{display:none}
  #side:not(:hover) #quien{display:none}
  #brand{font-size:17px;font-weight:800;letter-spacing:.04em;padding:6px 10px 16px}
  #brand span{color:var(--accent)}
  .app-btn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:none;border-left:3px solid transparent;
    color:var(--texto2);font-size:14px;font-weight:600;padding:12px 10px;border-radius:0 8px 8px 0;cursor:pointer;margin-bottom:4px}
  .app-btn:hover{background:var(--card);color:var(--texto)}
  .app-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .app-btn.active{background:var(--card);color:var(--texto);border-left-color:var(--accent)}
  .app-btn .ico{font-size:17px;width:22px;text-align:center}
  .app-btn.off{opacity:.45;cursor:default}
  .app-btn .pronto{font-size:9px;color:var(--texto2);border:1px solid var(--borde);border-radius:99px;padding:1px 6px;margin-left:auto}
  #side .abajo{margin-top:auto}
  #quien{font-size:10px;color:var(--texto2);padding:8px 10px;word-break:break-all}
  #salir{width:100%;padding:9px;border:1px solid var(--borde);border-radius:8px;background:transparent;color:var(--texto2);font-size:12px;cursor:pointer}
  #salir:hover{color:var(--texto);border-color:var(--accent)}

  #main{flex:1;display:flex;flex-direction:column;min-width:0}
  #topbar{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--borde);background:var(--panel)}
  #titulo{font-size:13px;font-weight:700}
  #abrir{margin-left:auto;font-size:12px;color:var(--texto2);text-decoration:none;border:1px solid var(--borde);border-radius:7px;padding:5px 10px}
  #abrir:hover{color:var(--texto);border-color:var(--accent)}
  #hint{display:none;font-size:12px;color:#0b1220;background:#f59e0b;border-radius:7px;padding:5px 10px;font-weight:700}
  #visor{flex:1;border:none;width:100%;background:var(--bg)}

  /* ── Panel Usuarios ── */
  #panel-usuarios{flex:1;display:none;overflow:auto;padding:18px}
  .caja{background:var(--card);border:1px solid var(--borde);border-radius:12px;max-width:820px}
  .caja + .caja{margin-top:16px}
  .caja .cab{font-weight:700;padding:14px 16px 4px}
  .caja .cuerpo{padding:12px 16px 16px}
  .fila-form{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .fila-form input,.fila-form select{padding:9px;border-radius:8px;border:1px solid var(--borde);background:#0b1220;color:var(--texto)}
  .btn-azul{padding:9px 16px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;cursor:pointer}
  .btn-gris{padding:7px 12px;border:1px solid var(--borde);border-radius:6px;background:transparent;color:var(--texto2);cursor:pointer}
  .btn-rojo{padding:6px 10px;border:1px solid #7f1d1d;border-radius:6px;background:transparent;color:var(--rojo);cursor:pointer}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{color:var(--texto2);text-align:left;font-size:11px;padding:8px 12px}
  td{padding:10px 12px;border-top:1px solid var(--borde)}
  select{background:#0b1220;color:var(--texto);border:1px solid var(--borde);border-radius:6px;padding:6px}
  .nota{font-size:12px;color:var(--texto2)}

  /* ── Chat del Asistente ── */
  #panel-asistente{flex:1;display:none;flex-direction:column;padding:14px;max-width:820px;width:100%;margin:0 auto;min-height:0}
  #chat-msgs{flex:1;overflow:auto;display:flex;flex-direction:column;gap:10px;padding:6px;min-height:0}
  .msg{max-width:82%;padding:10px 13px;border-radius:12px;font-size:13px;white-space:pre-wrap;line-height:1.45;word-break:break-word}
  .msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
  .msg.bot{align-self:flex-start;background:var(--card);border:1px solid var(--borde);border-bottom-left-radius:4px}
  .conf-btns{margin-top:10px;display:flex;gap:8px}
  .btn-verde{padding:7px 14px;border:none;border-radius:6px;background:var(--verde);color:#06210f;font-weight:700;cursor:pointer}
  #chat-form{display:flex;gap:8px;margin-top:10px}
  #chat-in{flex:1;padding:11px;border-radius:10px;border:1px solid var(--borde);background:#0b1220;color:var(--texto);font-size:13px}

  @media (max-width:720px){
    #os-view.on{flex-direction:column}
    #side{width:100%;min-width:0;flex-direction:row;align-items:center;overflow-x:auto;border-right:none;border-bottom:1px solid var(--borde);padding:8px}
    #side:hover{width:100%;min-width:0}
    #side:not(:hover) .lbl{display:inline}
    #side:not(:hover) .lbl-b{display:inline}
    #brand{padding:0 10px;font-size:14px;white-space:nowrap}
    .app-btn{width:auto;white-space:nowrap;border-left:none;border-bottom:3px solid transparent;border-radius:8px 8px 0 0;padding:9px 12px;margin-bottom:0}
    .app-btn.active{border-left-color:transparent;border-bottom-color:var(--accent)}
    .app-btn .pronto{display:none}
    #side .abajo{margin-top:0;margin-left:auto;display:flex;align-items:center}
    #quien{display:none}
    #salir{width:auto;padding:8px 10px;white-space:nowrap}
  }
  @media (prefers-reduced-motion:no-preference){
    .app-btn{transition:background .15s,color .15s,border-color .15s}
  }
</style>
</head>
<body>

<!-- ── Puerta de entrada ── -->
<div id="login-view">
  <div id="login-card">
    <h1>PONTEC <span>OS</span></h1>
    <p>Entra con tu usuario del sistema</p>
    <input id="lg-email" type="email" placeholder="Email" autocomplete="username">
    <input id="lg-pass" type="password" placeholder="Contrasena" autocomplete="current-password">
    <button onclick="entrar()">Entrar</button>
    <div id="login-err"></div>
  </div>
</div>

<!-- ── Sistema ── -->
<div id="os-view">
  <nav id="side" aria-label="Apps">
    <div id="brand">P<span class="lbl-b">ONTEC <span>OS</span> <span style="font-size:9px;color:var(--texto2);font-weight:400">v7</span></span></div>
    <div id="botones"></div>
    <div class="abajo">
      <div id="quien"></div>
      <button id="salir" onclick="salir()">&#128682;<span class="lbl"> Salir</span></button>
    </div>
  </nav>
  <div id="main">
    <div id="topbar">
      <div id="titulo"></div>
      <span id="hint"></span>
      <a id="abrir" href="#" target="_blank" rel="noopener">Abrir aparte &#8599;</a>
    </div>
    <iframe id="visor" title="App" allow="clipboard-write"></iframe>

    <div id="panel-asistente">
      <div id="chat-msgs"></div>
      <div id="chat-form">
        <input id="chat-in" placeholder="Escribi tu orden... (ej: sacale el descuento al OFI210-NE)">
        <button class="btn-azul" onclick="enviarChat()">Enviar</button>
      </div>
    </div>

    <div id="panel-usuarios">
      <div class="caja">
        <div class="cab">Crear usuario</div>
        <div class="cuerpo">
          <div class="fila-form">
            <input id="u-email" type="email" placeholder="Email" style="flex:2;min-width:180px">
            <input id="u-pass" type="text" placeholder="Contrasena (6+)" style="flex:1.5;min-width:140px">
            <select id="u-rol"><option value="operador">operador</option><option value="encargado">encargado</option><option value="admin">admin</option></select>
            <button id="u-crear" class="btn-azul" onclick="crearUsuarioOS()">Crear usuario</button>
          </div>
          <div id="u-msg" class="nota" style="margin-top:10px;min-height:16px"></div>
          <div class="nota" style="margin-top:4px">El usuario sirve para TODO Pontec OS. Las apps que ve se manejan aca; las pestanas internas de Rentabilidad, en su pestana Usuarios.</div>
        </div>
      </div>
      <div class="caja">
        <div class="cab">Equipo</div>
        <div id="u-lista"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  CONFIG — mismo Supabase y backend que MargenML (un solo login)
// ══════════════════════════════════════════════════════════════════
var SUPABASE_URL = 'https://flmmgkidltnqlsswiybp.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZsbW1na2lkbHRucWxzc3dpeWJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNjA4NDAsImV4cCI6MjA5NTkzNjg0MH0.IukPTOyweDDepc_VgGYNcOYK1rH-fL9-Vp6l-_uXZ5U';
var BACKEND_URL = 'https://margenml-backend-production.up.railway.app';

var APPS = [
  { id:'rentabilidad', nombre:'Rentabilidad', ico:'\uD83D\uDCCA',
    url:'https://margenml-frontend.vercel.app/' },
  { id:'logistica',    nombre:'Log\u00EDstica', ico:'\uD83D\uDCE6',
    url:'https://depositoml-frontend.vercel.app/' },
  { id:'promos',       nombre:'Promociones', ico:'\uD83D\uDCB8',
    url:'https://margenml-frontend.vercel.app/#promos' },
  { id:'respondia',    nombre:'RespondIA', ico:'\uD83D\uDCAC',
    url:'https://respondia-frontend.vercel.app/' },
  { id:'asistente',    nombre:'Asistente', ico:'\uD83E\uDD16', panel:true }
];
var APP_NOMBRES = {rentabilidad:'Rentabilidad', logistica:'Logistica', promos:'Promociones', respondia:'RespondIA', asistente:'Asistente'};

var _sb=null, MI_ROL='operador', MI_EMAIL='', MI_APPS=null, _usr=[];
function getSb(){ if(!_sb && window.supabase){ _sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY); } return _sb; }
async function authHeaders(){
  var s=await getSb().auth.getSession();
  var t=s.data.session && s.data.session.access_token;
  return t ? { Authorization:'Bearer '+t } : {};
}
function appsPorRol(rol){
  if(rol==='admin') return ['rentabilidad','logistica','promos','respondia','asistente'];
  if(rol==='encargado') return ['rentabilidad','logistica','promos','respondia'];
  return ['rentabilidad','logistica'];
}

// ── Entrada / salida ─────────────────────────────────────────────
async function entrar(){
  var err=document.getElementById('login-err'); err.textContent='';
  var em=(document.getElementById('lg-email').value||'').trim();
  var pw=document.getElementById('lg-pass').value||'';
  if(!em||!pw){ err.textContent='Completa email y contrasena.'; return; }
  try{
    var r=await getSb().auth.signInWithPassword({email:em,password:pw});
    if(r.error){ err.textContent='No pudimos entrar: '+r.error.message; return; }
    arrancar();
  }catch(e){ err.textContent='Error: '+e.message; }
}
async function salir(){ try{ await getSb().auth.signOut(); }catch(e){} location.reload(); }
document.getElementById('lg-pass').addEventListener('keydown',function(e){ if(e.key==='Enter') entrar(); });

// ── Arranque del sistema ─────────────────────────────────────────
async function arrancar(){
  try{
    var h=await authHeaders();
    var r=await fetch(BACKEND_URL+'/api/mi-rol',{headers:h});
    var d=await r.json();
    if(d && d.rol){ MI_ROL=d.rol; MI_EMAIL=(d.email||'').toLowerCase(); MI_APPS=(d.apps&&d.apps.length)?d.apps:null; }
  }catch(e){}
  document.getElementById('login-view').style.display='none';
  document.getElementById('os-view').classList.add('on');
  document.getElementById('quien').textContent=MI_EMAIL+' \u00B7 '+MI_ROL;
  armarSidebar();
}
function armarSidebar(){
  var visibles=(MI_APPS&&MI_APPS.length)?MI_APPS:appsPorRol(MI_ROL);
  var cont=document.getElementById('botones'); cont.innerHTML='';
  APPS.forEach(function(a){
    if(visibles.indexOf(a.id)===-1) return;
    var b=document.createElement('button');
    b.className='app-btn'+(a.off?' off':''); b.id='btn-'+a.id;
    b.innerHTML='<span class="ico">'+a.ico+'</span><span class="lbl">'+a.nombre+'</span>'+(a.off?'<span class="pronto">pronto</span>':'');
    if(!a.off) b.onclick=function(){ abrirApp(a.id); };
    cont.appendChild(b);
  });
  if(MI_ROL==='admin'){
    var u=document.createElement('button');
    u.className='app-btn'; u.id='btn-usuarios';
    u.innerHTML='<span class="ico">\uD83D\uDC65</span><span class="lbl">Usuarios</span>';
    u.onclick=abrirUsuarios;
    cont.appendChild(u);
  }
  var inicial='rentabilidad';
  try{ inicial=localStorage.getItem('pontecos_app')||inicial; }catch(e){}
  var ok=false; APPS.forEach(function(x){ if(x.id===inicial && !x.off && visibles.indexOf(x.id)>-1) ok=true; });
  if(!ok){ inicial=null; APPS.forEach(function(x){ if(!inicial && !x.off && visibles.indexOf(x.id)>-1) inicial=x.id; }); }
  if(inicial) abrirApp(inicial); else if(MI_ROL==='admin') abrirUsuarios();
}
function _activar(id){
  document.querySelectorAll('.app-btn').forEach(function(b){ b.classList.remove('active'); });
  var b=document.getElementById('btn-'+id); if(b) b.classList.add('active');
}
function abrirApp(id){
  var a=null; APPS.forEach(function(x){ if(x.id===id) a=x; });
  if(!a||a.off) return;
  if(a.panel){ abrirAsistente(); try{ localStorage.setItem('pontecos_app',id); }catch(e){} return; }
  _activar(id);
  document.getElementById('panel-usuarios').style.display='none';
  document.getElementById('panel-asistente').style.display='none';
  var visor=document.getElementById('visor'); visor.style.display='';
  document.getElementById('titulo').textContent=a.nombre;
  var abrir=document.getElementById('abrir'); abrir.style.display=''; abrir.href=a.url;
  if(visor.getAttribute('src')!==a.url) visor.setAttribute('src',a.url);
  var hint=document.getElementById('hint');
  if(a.hint){ hint.textContent=a.hint; hint.style.display='inline-block';
    clearTimeout(window._ht); window._ht=setTimeout(function(){ hint.style.display='none'; },9000);
  } else { hint.style.display='none'; }
  try{ localStorage.setItem('pontecos_app',id); }catch(e){}
}

// ── Usuarios (solo admin; el backend igual lo exige) ─────────────
function abrirUsuarios(){
  _activar('usuarios');
  document.getElementById('panel-asistente').style.display='none';
  document.getElementById('visor').style.display='none';
  document.getElementById('abrir').style.display='none';
  document.getElementById('hint').style.display='none';
  document.getElementById('titulo').textContent='Usuarios de Pontec OS';
  document.getElementById('panel-usuarios').style.display='block';
  renderUsuariosOS();
}
async function renderUsuariosOS(){
  var cont=document.getElementById('u-lista');
  cont.innerHTML='<div class="nota" style="padding:14px">Cargando...</div>';
  try{
    var h=await authHeaders();
    var r=await fetch(BACKEND_URL+'/api/usuarios',{headers:h});
    var d=await r.json();
    if(d.error){ cont.innerHTML='<div style="color:var(--rojo);padding:14px">'+d.error+'</div>'; return; }
    _usr=d.usuarios||[];
    var rows=_usr.map(function(u,ix){
      var esYo=(String(u.email||'').toLowerCase()===MI_EMAIL);
      var pers=(u.apps&&u.apps.length)?' <span style="color:#f59e0b;font-size:10px">&#9733;</span>':'';
      return '<tr>'
        +'<td>'+u.email+(esYo?' <span class="nota" style="font-size:11px">(vos)</span>':'')+pers+'</td>'
        +'<td><select onchange="cambiarRolOS('+ix+',this.value)" '+(esYo?'disabled':'')+'>'
        +['admin','encargado','operador'].map(function(rl){return '<option value="'+rl+'"'+(u.rol===rl?' selected':'')+'>'+rl+'</option>';}).join('')
        +'</select></td>'
        +'<td style="text-align:right;white-space:nowrap">'
        +'<button class="btn-gris" onclick="toggleAppsOS('+ix+')" style="margin-right:6px">Apps</button>'
        +(esYo?'':'<button class="btn-rojo" onclick="borrarUsuarioOS('+ix+')">Borrar</button>')
        +'</td></tr>'
        +'<tr id="u-apps-'+ix+'" style="display:none"><td colspan="3" style="background:#0d1526">'
        +'<div class="nota" style="margin-bottom:8px">Que apps ve '+u.email+' (sin marcar nada, usa las del rol):</div>'
        +'<div id="u-apps-chk-'+ix+'" style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px"></div>'
        +'<button class="btn-azul" onclick="guardarAppsOS('+ix+')" style="padding:7px 12px;margin-right:6px">Guardar</button>'
        +'<button class="btn-gris" onclick="appsSegunRolOS('+ix+')">Volver a "segun rol"</button>'
        +'<span id="u-apps-msg-'+ix+'" class="nota" style="margin-left:10px"></span>'
        +'</td></tr>';
    }).join('');
    cont.innerHTML='<table><tr><th>Email</th><th>Rol</th><th></th></tr>'+rows+'</table>';
  }catch(e){ cont.innerHTML='<div style="color:var(--rojo);padding:14px">Error: '+e.message+'</div>'; }
}
function toggleAppsOS(ix){
  var fila=document.getElementById('u-apps-'+ix); if(!fila) return;
  if(fila.style.display!=='none'){ fila.style.display='none'; return; }
  var u=_usr[ix];
  var marcadas=(u.apps&&u.apps.length)?u.apps:appsPorRol(u.rol);
  var box=document.getElementById('u-apps-chk-'+ix);
  box.innerHTML=['rentabilidad','logistica','promos','respondia','asistente'].map(function(a){
    return '<label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;color:#c9d4e8">'
      +'<input type="checkbox" value="'+a+'"'+(marcadas.indexOf(a)>-1?' checked':'')+'> '+APP_NOMBRES[a]+'</label>';
  }).join('');
  fila.style.display='';
}
async function guardarAppsOS(ix){
  var u=_usr[ix];
  var box=document.getElementById('u-apps-chk-'+ix);
  var sel=[].slice.call(box.querySelectorAll('input:checked')).map(function(c){return c.value;});
  var msg=document.getElementById('u-apps-msg-'+ix); msg.style.color='var(--rojo)'; msg.textContent='';
  if(!sel.length){ msg.textContent='Marca al menos una app (o usa "segun rol")'; return; }
  try{
    var h=await authHeaders(); h['Content-Type']='application/json';
    var r=await fetch(BACKEND_URL+'/api/usuarios',{method:'PUT',headers:h,body:JSON.stringify({email:u.email,rol:u.rol,apps:sel})});
    var d=await r.json();
    if(d.error){ msg.textContent=d.error; return; }
    msg.style.color='var(--verde)'; msg.textContent='Guardado';
    setTimeout(renderUsuariosOS,600);
  }catch(e){ msg.textContent='Error: '+e.message; }
}
async function appsSegunRolOS(ix){
  var u=_usr[ix];
  try{
    var h=await authHeaders(); h['Content-Type']='application/json';
    var r=await fetch(BACKEND_URL+'/api/usuarios',{method:'PUT',headers:h,body:JSON.stringify({email:u.email,rol:u.rol,apps:null})});
    var d=await r.json();
    if(d.error){ alert('Error: '+d.error); return; }
    renderUsuariosOS();
  }catch(e){ alert('Error: '+e.message); }
}
async function crearUsuarioOS(){
  var em=(document.getElementById('u-email').value||'').trim().toLowerCase();
  var pw=document.getElementById('u-pass').value||'';
  var rl=document.getElementById('u-rol').value;
  var msg=document.getElementById('u-msg'); msg.style.color='var(--rojo)'; msg.textContent='';
  if(!em||em.indexOf('@')===-1){ msg.textContent='Email invalido'; return; }
  if(pw.length<6){ msg.textContent='La contrasena necesita 6 caracteres o mas'; return; }
  var btn=document.getElementById('u-crear'); btn.textContent='Creando...'; btn.disabled=true;
  try{
    var h=await authHeaders(); h['Content-Type']='application/json';
    var r=await fetch(BACKEND_URL+'/api/usuarios',{method:'POST',headers:h,body:JSON.stringify({email:em,password:pw,rol:rl})});
    var d=await r.json();
    if(d.error){ msg.textContent=d.error; }
    else{ msg.style.color='var(--verde)'; msg.textContent='Usuario creado: '+em+' ('+rl+')'; document.getElementById('u-email').value=''; document.getElementById('u-pass').value=''; renderUsuariosOS(); }
  }catch(e){ msg.textContent='Error: '+e.message; }
  btn.textContent='Crear usuario'; btn.disabled=false;
}
async function cambiarRolOS(ix,rol){
  var u=_usr[ix];
  try{
    var h=await authHeaders(); h['Content-Type']='application/json';
    var r=await fetch(BACKEND_URL+'/api/usuarios',{method:'PUT',headers:h,body:JSON.stringify({email:u.email,rol:rol})});
    var d=await r.json();
    if(d.error){ alert('Error: '+d.error); }
    renderUsuariosOS();
  }catch(e){ alert('Error: '+e.message); }
}
async function borrarUsuarioOS(ix){
  var u=_usr[ix];
  if(!confirm('Borrar el usuario '+u.email+'? No va a poder entrar mas a Pontec OS.')) return;
  try{
    var h=await authHeaders();
    var r=await fetch(BACKEND_URL+'/api/usuarios?email='+encodeURIComponent(u.email),{method:'DELETE',headers:h});
    var d=await r.json();
    if(d.error) alert('Error: '+d.error);
    renderUsuariosOS();
  }catch(e){ alert('Error: '+e.message); }
}

// ── Asistente: chat que interpreta y ejecuta ordenes ─────────────
var _chatHist=[], _chatPend=null;
function abrirAsistente(){
  _activar('asistente');
  document.getElementById('visor').style.display='none';
  document.getElementById('abrir').style.display='none';
  document.getElementById('hint').style.display='none';
  document.getElementById('panel-usuarios').style.display='none';
  document.getElementById('titulo').textContent='Asistente';
  document.getElementById('panel-asistente').style.display='flex';
  if(!document.getElementById('chat-msgs').children.length){
    _burBot('Hola! Por ahora manejo los descuentos de ML. Proba con:\n- "sacale el descuento al AIR010-BL"\n- "ponele descuento al OFI210-NE a 28500"\n- "que promos tiene el HAM200-AZ?"\n- "buscame las publicaciones del GRI100-CO"\n\nAntes de tocar algo, siempre te muestro que voy a hacer y espero tu Confirmar.');
  }
  document.getElementById('chat-in').focus();
}
function _bur(t,cls){
  var d=document.createElement('div'); d.className='msg '+cls; d.textContent=t;
  document.getElementById('chat-msgs').appendChild(d);
  d.scrollIntoView({block:'end'});
  return d;
}
function _burBot(t){ return _bur(t,'bot'); }
async function enviarChat(){
  var inp=document.getElementById('chat-in'); var t=(inp.value||'').trim();
  if(!t) return;
  inp.value=''; _bur(t,'user');
  _chatHist.push({rol:'user',texto:t}); _chatPend=null;
  var esp=_burBot('...');
  try{
    var h=await authHeaders(); h['Content-Type']='application/json';
    var r=await fetch(BACKEND_URL+'/api/asistente',{method:'POST',headers:h,body:JSON.stringify({mensajes:_chatHist.slice(-12)})});
    var d=await r.json();
    esp.remove();
    if(d.error){ _burBot('Error: '+d.error); return; }
    var b=_burBot(d.respuesta||'(sin respuesta)');
    _chatHist.push({rol:'bot',texto:d.respuesta||''});
    if(d.pendiente){
      _chatPend=d.pendiente;
      var caja=document.createElement('div'); caja.className='conf-btns';
      var si=document.createElement('button'); si.textContent='Confirmar'; si.className='btn-verde';
      var no=document.createElement('button'); no.textContent='Cancelar'; no.className='btn-gris';
      si.onclick=function(){ caja.remove(); confirmarChat(); };
      no.onclick=function(){ caja.remove(); _chatPend=null; _burBot('Cancelado, no toco nada.'); _chatHist.push({rol:'bot',texto:'Cancelado.'}); };
      caja.appendChild(si); caja.appendChild(no); b.appendChild(caja);
    }
  }catch(e){ esp.remove(); _burBot('Error: '+e.message); }
}
async function confirmarChat(){
  if(!_chatPend) return;
  var esp=_burBot('Ejecutando...');
  try{
    var h=await authHeaders(); h['Content-Type']='application/json';
    var r=await fetch(BACKEND_URL+'/api/asistente',{method:'POST',headers:h,body:JSON.stringify({confirmar:_chatPend})});
    var d=await r.json();
    esp.remove();
    _burBot(d.error?('Error: '+d.error):(d.respuesta||'Listo.'));
    _chatHist.push({rol:'bot',texto:d.respuesta||'Listo.'});
  }catch(e){ esp.remove(); _burBot('Error: '+e.message); }
  _chatPend=null;
}
document.getElementById('chat-in').addEventListener('keydown',function(e){ if(e.key==='Enter') enviarChat(); });

// ── SSO: las apps embebidas piden la sesion y el hub se la pasa ───
// Solo responde a los origenes de SUS apps (nunca a un tercero).
var ORIGENES_OK = [];
APPS.forEach(function(a){ if(a.url){ try{ ORIGENES_OK.push(new URL(a.url).origin); }catch(e){} } });
window.addEventListener('message', async function(ev){
  if (ORIGENES_OK.indexOf(ev.origin) === -1) return;
  var d = ev.data || {};
  if (d.tipo !== 'pontecos-pedir-sesion') return;
  try{
    var s = await getSb().auth.getSession();
    var ses = s.data.session;
    if (ses && ev.source) ev.source.postMessage({ tipo:'pontecos-sesion', access_token: ses.access_token, refresh_token: ses.refresh_token }, ev.origin);
  }catch(e){}
});

// ── Si ya hay sesion, entra derecho ──────────────────────────────
if(window.supabase){
  getSb().auth.getSession().then(function(s){ if(s.data.session){ arrancar(); } });
}
</script>
